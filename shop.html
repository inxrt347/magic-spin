<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background: #cee8ff; color: #fff; font-family: 'Press Start 2P', cursive; text-align: center; padding: 20px; }
        input { padding: 10px; font-family: inherit; width: 100px; text-align: center; }
        button { background: #0088cc; color: white; border: none; padding: 15px; font-family: inherit; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div style="text-align: left; margin-bottom: 20px;">
    <a href="index.html" style="text-decoration: none; color: #96bbff; font-size: 12px;"> < BACK TO GAME</a>
</div>
    <div class="balance-box">
        ВАШ БАЛАНС: <span id="user-balance">0</span> 🪙
    </div>

    <h3>КУПИТЬ МОНЕТЫ</h3>
    <input type="number" id="coin-amount" value="10" min="1">
    <br>
    <button onclick="buy()">КУПИТЬ ТИРЫ ЗА ⭐</button>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://ваш-логин.pythonanywhere.com';
        const userId = tg.initDataUnsafe.user?.id;

        // Загрузка баланса при входе
        async function loadBalance() {
            if (!userId) return;
            const res = await fetch(`${API_BASE}/get-balance?user_id=${userId}`);
            const data = await res.json();
            document.getElementById('user-balance').innerText = data.balance;
        }

        async function buy() {
            const amount = document.getElementById('coin-amount').value;
            
            const res = await fetch(`${API_BASE}/buy-coins`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, amount: amount })
            });
            
            const { link } = await res.json();
            
            tg.openInvoice(link, (status) => {
                if (status === 'paid') {
                    setTimeout(loadBalance, 2000); // Обновляем баланс через 2 сек (ждем бэкенд)
                }
            });
        }

        loadBalance();
    </script>
</body>
</html>
